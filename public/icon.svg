<svg xmlns="http://www.w3.org/2000/svg" viewBox="15 15 70 70">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  
  <!-- Transparent background for the tab icon -->
  <rect width="100" height="100" fill="transparent" />

  <!-- Gradient Stroke for the lines -->
  <g stroke="url(#grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- D Body and curve -->
    <path d="M 22 25 L 22 75 M 22 25 L 42 25 A 25 25 0 0 1 42 75 L 22 75" />
    <!-- Node Handle extending from the curve -->
    <path d="M 67 50 L 78 50 M 78 38 L 78 62" />
  </g>
  
  <!-- Gradient Fill for the connection nodes -->
  <g fill="url(#grad)">
    <circle cx="22" cy="25" r="4" />
    <circle cx="22" cy="75" r="4" />
    <circle cx="67" cy="50" r="4" />
    <circle cx="78" cy="38" r="4" />
    <circle cx="78" cy="62" r="4" />
  </g>
</svg>
